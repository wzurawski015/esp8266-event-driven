name: ci

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  host-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Generate living documentation artifacts
        run: ./tools/fw docgen

      - name: Build and run host smoke tests
        run: ./tools/fw host-test
