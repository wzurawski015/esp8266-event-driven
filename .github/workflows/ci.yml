name: ci

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  host-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Generate living documentation artifacts
        run: ./tools/fw docgen

      - name: Verify generated documentation is checked in
        run: git diff --exit-code

      - name: Build and run host smoke tests
        run: ./tools/fw host-test

  sdk-target-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Build SDK image
        run: ./tools/fw sdk-image

      - name: Validate pinned SDK toolchain contract
        run: ./tools/fw sdk-check

      - name: Materialize sdkconfig from defaults
        run: ./tools/fw sdk-defconfig

      - name: Build minimal ESP8266 target skeleton
        run: ./tools/fw sdk-build

  sdk-atnel-target-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Build board-specific SDK image
        run: ./tools/fw sdk-image

      - name: Materialize ATNEL board target sdkconfig from defaults
        env:
          FW_SDK_PROJECT_DIR: adapters/esp8266_rtos_sdk/targets/atnel_air_esp_motherboard
        run: ./tools/fw sdk-defconfig

      - name: Build ATNEL board target
        env:
          FW_SDK_PROJECT_DIR: adapters/esp8266_rtos_sdk/targets/atnel_air_esp_motherboard
        run: ./tools/fw sdk-build
