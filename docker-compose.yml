version: "3.9"

services:
  # -------------------------------------------------------------------------
  # build — compile the firmware inside the reproducible build container
  # -------------------------------------------------------------------------
  build:
    build:
      context: .
      dockerfile: Dockerfile
    image: esp8266-event-driven-build
    volumes:
      # Mount the repository root so changes are reflected immediately
      - .:/workspace:z
    working_dir: /workspace
    # Placeholder command — replace with real cmake invocation once sources exist
    command: >
      bash -c "echo 'TODO: cmake -B build && cmake --build build'"

